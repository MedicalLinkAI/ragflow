# =============================================================================
# RAGflow Web — nginx reverse proxy for ragflow-web container
# =============================================================================
# 职责: 提供静态文件 + 反向代理 API 到 ragflow-api 容器
# 注意: proxy_pass 使用容器名 ragflow-api (非 localhost)
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain application/javascript application/x-javascript text/css
               application/xml text/javascript application/x-httpd-php
               image/jpeg image/gif image/png;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # Admin API proxy — port 9381
    location ~ ^/api/v1/admin {
        proxy_pass http://ragflow-api:9381;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffer_size 1024k;
        proxy_buffers 16 1024k;
        proxy_busy_buffers_size 2048k;
        proxy_temp_file_write_size 2048k;
    }

    # Main API proxy — port 9380
    location ~ ^/(v1|api) {
        proxy_pass http://ragflow-api:9380;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffer_size 1024k;
        proxy_buffers 16 1024k;
        proxy_busy_buffers_size 2048k;
        proxy_temp_file_write_size 2048k;
    }

    # Static frontend (SPA fallback)
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Long-lived static asset caching
    location ~ ^/static/(css|js|media)/ {
        expires 10y;
        access_log off;
    }
}
